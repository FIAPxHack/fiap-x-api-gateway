name: "[Main] Build, Test & SonarCloud Analysis"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  build-test-and-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner
      
      - name: Install Coverage Tools
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"FIAPxHack_fiap-x-api-gateway" \
            /o:"fiapxhack" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="coverage/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/tests/**/*" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.dll,**/*.exe,**/Migrations/**"

      - name: Build for Analysis
        run: dotnet build fiap-x-api-gateway.sln --configuration Release --no-incremental
      
      - name: Run Tests with Coverage
        run: |
          dotnet test fiap-x-api-gateway.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"Code Coverage" \
            --results-directory ./TestResults
      
      - name: Convert Coverage to OpenCover
        run: |
          echo "=== Converting .coverage to Cobertura XML ==="
          dotnet-coverage merge ./TestResults/**/*.coverage -f cobertura -o coverage.cobertura.xml
          
          echo "=== Converting Cobertura to OpenCover format ==="
          reportgenerator \
            -reports:"coverage.cobertura.xml" \
            -targetdir:"coverage" \
            -reporttypes:"OpenCover" \
            -assemblyfilters:"+Gateway;-Gateway.Tests"
          
          echo "=== Generated coverage file ==="
          ls -lh coverage/coverage.opencover.xml

      - name: End SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: 'coverage/coverage.opencover.xml'
          retention-days: 30
